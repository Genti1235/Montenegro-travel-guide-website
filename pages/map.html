<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Map - Montenegro Travel Guide</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#f4efe6;color:#1d2528;font-family:Arial,sans-serif}iframe{display:block;width:100%;height:100vh;border:0;background:#fffdf8}.loading{position:fixed;inset:0;display:grid;place-items:center;font:700 14px Arial;color:#0e6f8f;background:#f4efe6;z-index:1}.ready .loading{display:none}
  </style>
</head>
<body>
  <div class="loading">Loading corrected interactive map...</div>
  <iframe id="prototypeFrame" src="prototype.html" title="Interactive Montenegro map prototype"></iframe>
  <script>
    const frame = document.getElementById('prototypeFrame');
    frame.addEventListener('load', () => {
      const doc = frame.contentDocument;
      if (!doc) return;
      document.body.classList.add('ready');

      const style = doc.createElement('style');
      style.textContent = `
        .topbar, body > nav, .hero, .stories-band, .cards-bg, footer { display:none !important; }
        body { background:#F4EFE6 !important; overflow-x:hidden !important; }
        main { display:block !important; }
        .map-section-bg { background:#F4EFE6 !important; border:0 !important; }
        .map-section-bg .w { max-width:1260px !important; padding:28px 32px 40px !important; }
        .section-head { margin-bottom:18px !important; }
        .map-layout { grid-template-columns:minmax(0, 1fr) 350px !important; gap:40px !important; align-items:start !important; }
        .map-svg-container { width:70% !important; min-width:0 !important; margin:0 auto !important; overflow:visible !important; }
        .map-svg-container svg { width:100% !important; height:auto !important; max-height:none !important; }
        .map-panel { position:sticky !important; top:86px !important; }
        .poi-label { font-size:10px !important; paint-order:stroke; stroke:#eefaff; stroke-width:3px; stroke-linejoin:round; }
        .lbl-city, .lbl-town { paint-order:stroke; stroke:#eefaff; stroke-width:3px; stroke-linejoin:round; }
        .lake-shape { stroke:#ffffff !important; stroke-width:1.8 !important; vector-effect:non-scaling-stroke !important; }
        .lake-shore { stroke:#ffffff !important; stroke-width:1.8 !important; opacity:1 !important; vector-effect:non-scaling-stroke !important; }
        .lake-border-line { fill:none !important; stroke:#ffffff !important; stroke-width:1.8 !important; stroke-linecap:round !important; stroke-linejoin:round !important; vector-effect:non-scaling-stroke !important; pointer-events:none !important; }
        .region.selected-muni { stroke:#152535 !important; stroke-width:1.8 !important; }
        .selected-outline { fill:none !important; stroke:#152535 !important; stroke-width:1.8 !important; stroke-linejoin:round !important; stroke-linecap:round !important; vector-effect:non-scaling-stroke !important; pointer-events:none !important; }
        @media(max-width:1024px){ .map-layout{grid-template-columns:1fr !important}.map-panel{position:static !important}.map-svg-container{width:82% !important} }
        @media(max-width:760px){ .map-section-bg .w{padding:20px 16px 32px !important}.map-svg-container{width:100% !important} }
      `;
      doc.head.appendChild(style);

      const svg = doc.getElementById('montenegroMap');
      if (!svg) return;

      function moveText(text, attrs){
        [...svg.querySelectorAll('text')].filter(el => el.textContent.trim() === text).forEach(el => {
          for (const [key, val] of Object.entries(attrs)) el.setAttribute(key, val);
        });
      }
      function movePoiLabel(text, attrs){
        [...svg.querySelectorAll('.poi-label')].filter(el => el.textContent.trim().includes(text)).forEach(el => {
          for (const [key, val] of Object.entries(attrs)) el.setAttribute(key, val);
        });
      }

      setTimeout(() => {
        moveText('Kotor', {x:'54', y:'591', 'text-anchor':'end'});
        moveText('Herceg Novi', {x:'118', y:'626', 'text-anchor':'start'});
        moveText('Tivat', {x:'135', y:'724', 'text-anchor':'start'});
        moveText('Budva', {x:'230', y:'744', 'text-anchor':'start'});
        moveText('Bar', {x:'353', y:'794', 'text-anchor':'start'});
        moveText('Zeta', {x:'382', y:'731', 'text-anchor':'start'});
        moveText('Kolašin', {x:'462', y:'444', 'text-anchor':'start'});
        movePoiLabel('Kotor', {x:'74', y:'555', 'text-anchor':'end'});
        movePoiLabel('Perast', {x:'157', y:'548', 'text-anchor':'start'});
        movePoiLabel('Lovćen', {x:'151', y:'632', 'text-anchor':'end'});
        movePoiLabel('Sveti Stefan', {x:'242', y:'809', 'text-anchor':'start'});
        movePoiLabel('Biogradska', {x:'462', y:'468', 'text-anchor':'start'});
        movePoiLabel('Prokletije', {x:'632', y:'600', 'text-anchor':'start'});
      }, 250);

      const lakeBorderLayer = doc.createElementNS('http://www.w3.org/2000/svg','g');
      lakeBorderLayer.setAttribute('id','lakeBorderLayer');
      const lakeBorder = doc.createElementNS('http://www.w3.org/2000/svg','path');
      lakeBorder.setAttribute('class','lake-border-line');
      lakeBorder.setAttribute('d','M354 724 C371 736 387 750 403 766 C420 783 439 797 462 807');
      lakeBorderLayer.appendChild(lakeBorder);
      svg.appendChild(lakeBorderLayer);

      const layer = doc.createElementNS('http://www.w3.org/2000/svg','g');
      layer.setAttribute('id','selectionOutlineLayer');
      svg.appendChild(layer);

      function redrawSelectionOutline(){
        layer.innerHTML = '';
        const selected = [...svg.querySelectorAll('.region.selected-muni')];
        selected.forEach(path => {
          const clone = path.cloneNode(false);
          clone.removeAttribute('id');
          clone.removeAttribute('class');
          clone.setAttribute('class','selected-outline');
          layer.appendChild(clone);
        });
      }

      svg.addEventListener('click', () => setTimeout(redrawSelectionOutline, 0), true);
      doc.addEventListener('click', event => {
        if (event.target && event.target.matches && event.target.matches('[data-select-type]')) {
          setTimeout(redrawSelectionOutline, 0);
        }
        if (event.target && event.target.id === 'panelBack') {
          setTimeout(() => { layer.innerHTML = ''; }, 0);
        }
      }, true);
    });
  </script>
</body>
</html>
